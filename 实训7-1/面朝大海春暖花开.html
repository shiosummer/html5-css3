<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>面朝大海，春暖花开</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background-image: url(image/jianbian.png);
            background-repeat: no-repeat;
            background-size: cover;
            background-position: center;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 40px 20px;
        }
        .poem {
            text-align: center;
            line-height: 2.5;
            font-family: "Kaiti", "楷体", "STKaiti", "华文楷体", serif;
            font-size: 18px;
        }
        .poem h1 {
            font-size: 28px;
            font-weight: bold;
            margin-bottom: 30px;
            color: #FFFF00;
            text-shadow: 1px 1px 2px #000;
        }
        .poem p {
            margin: 8px 0;
            color: #333;
            text-shadow: 0 0 3px rgba(255,255,255,0.8);
        }
        .poem p.blue {
            color: blue;
            font-weight: bold;
            font-size: 20px;
        }
        .poem p.yellow {
            color: #FFCC00;
            text-decoration: underline;
        }
        .poem p.foot {
            color: #FFFF00;
            text-shadow: 1px 1px 2px #000;
            margin-top: 20px;
        }
        .poem p.student-info {
            color: #FFFF00;
            text-shadow: 1px 1px 2px #000;
            font-size: 14px;
            margin-top: 5px;
        }
        .footer-banner {
            background-color: #0066FF;
            padding: 20px 40px;
            text-align: center;
            margin-top: 30px;
        }
    </style>
</head>
<body>
    <div class="poem">
        <h1>面朝大海，春暖花开</h1>
        <p>从明天起，做一个幸福的人</p>
        <p>喂马、劈柴，周游世界</p>
        <p>从明天起，关心粮食和蔬菜</p>
        <p>我有一所房子，面朝大海，春暖花开</p>
        <p>从明天起，和每一个亲人通信</p>
        <p>告诉他们我的幸福</p>
        <p>那幸福的闪电告诉我的</p>
        <p>我将告诉每一个人</p>
        <p class="blue">给每一条河每一座山取一个温暖的名字</p>
        <p>陌生人，我也为你祝福</p>
        <p class="yellow">愿你有一个灿烂的前程</p>
        <p class="yellow">愿你有情人终成眷属</p>
        <p class="yellow">愿你在尘世获得幸福</p>
        <div class="footer-banner">
            <p class="foot">我只愿面朝大海，春暖花开</p>
            <p class="student-info">25计算机1班 郑蔚楠 24070110155号</p>
        </div>
    </div>
</body>
</html>
