<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>初相遇</title>
    <link rel="stylesheet" href="初相遇.css">
</head>
<body>
    <div id="container">
        <h1>初相遇</h1>
        <p class="author">文/席慕容</p>
        <p class="first-letter">美丽的梦和美丽的诗一样，都是可遇而不可求的，常常在最没能料到的时刻里出现。</p>
        <p>我喜欢那样的梦，在梦里，一切都可以重新开始，一切都可以慢慢解释，心里甚至还能感觉到，所有被浪费的时光竟然都能重回时的狂喜与感激。<em class="blue-text">胸怀中满溢着幸福，只因你就在我眼前，对我微笑，一如当年。</em></p>
        <p class="underline">我喜欢那样的梦，明明知道你已离我远去，却又觉得芳草鲜美，落英缤纷，好像你我才初相遇。</p>
    </div>
</body>
</html>
