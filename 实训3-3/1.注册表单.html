<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>会员账号注册</title>
</head>
<body>
  <form>
    <fieldset>
      <legend>会员账号</legend>
      <p><label>会员账号：<input type="text" value="张三"></label></p>
      <p><label>登录密码：<input type="password"></label></p>
      <p><label>确认密码：<input type="password"></label></p>
      <p>会员性别：
        <input type="radio" name="sex" checked>男
        <input type="radio" name="sex">女
      </p>
      <p>个人爱好：
        <input type="checkbox"> 运动
        <input type="checkbox"> 聊天
        <input type="checkbox"> 游戏
      </p>
      <p><label>出生日期：<input type="text" value="年 / 月 / 日"></label></p>
      <p><label>电子邮箱：<input type="email"></label></p>
      <p><label>上传头像：<input type="file"></label></p>
      <p>
        <input type="submit" value="提交注册信息">
        <input type="reset" value="重置">
      </p>
    </fieldset>
  </form>
</body>
</html>
