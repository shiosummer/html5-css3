<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <script src="https://cdn.jsdelivr.net/npm/vue@3"></script>
  <style>
    body { font-family: Arial; }
    .orange-box { border: 2px solid orange; padding: 15px; max-width: 450px; margin: 20px auto; }
    .title { text-align: center; color: orange; margin: 0; }
    .row { margin: 8px 0; display: flex; align-items: center; }
    .row label { width: 70px; text-align: right; margin-right: 8px; }
    .row input, .row select { flex: 1; padding: 4px; border: 1px solid #ccc; }
    .btn-center { text-align: center; margin-top: 8px; }
    .btn { padding: 5px 15px; background: #ddd; border: 1px solid #ccc; }
    table { width: 100%; border-collapse: collapse; margin-top: 15px; }
    th { background: orange; color: white; padding: 6px; }
    td { text-align: center; padding: 6px; border: 1px solid #ddd; }
    .del { padding: 2px 8px; background: #ddd; border: 1px solid #aaa; }
  </style>
</head>
<body>
  <div id="app">
    <p>1. 使用vue基础指令完成学生信息录入页面<br>2. 完成新增信息、删除信息和展示信息列表</p>
    <div class="orange-box">
      <h2 class="title">学生信息录入系统</h2>
      <div class="row"><label>姓名：</label><input v-model="f.name" placeholder="请输入姓名"></div>
      <div class="row"><label>年龄：</label><input v-model="f.age" placeholder="请输入年龄"></div>
      <div class="row"><label>性别：</label>
        <select v-model="f.sex"><option>男</option><option>女</option></select>
      </div>
      <div class="row"><label>手机：</label><input v-model="f.phone" placeholder="请输入手机号码"></div>
      <div class="btn-center"><button class="btn" @click="add">创建新用户</button></div>
    </div>
    <table>
      <tr><th>姓名</th><th>性别</th><th>年龄</th><th>手机</th><th>删除</th></tr>
      <tr v-for="(s,i) in list" :key="i">
        <td>{{s.name}}</td><td>{{s.sex}}</td><td>{{s.age}}</td><td>{{s.phone}}</td>
        <td><button class="del" @click="del(i)">删除</button></td>
      </tr>
    </table>
  </div>
  <script>
    Vue.createApp({
      data() {
        return {
          f: {name:'',age:'',sex:'男',phone:''},
          list: [
            {name:'小明',sex:'男',age:'12',phone:'151321'},
            {name:'张三',sex:'男',age:'20',phone:'15473124380'},
            {name:'李四',sex:'男',age:'20',phone:'15373124380'},
            {name:'王五',sex:'男',age:'20',phone:'15273124380'}
          ]
        };
      },
      methods: {
        add() { if(this.f.name&&this.f.age&&this.f.phone) { this.list.push({...this.f}); this.f={name:'',age:'',sex:'男',phone:''}; } },
        del(i) { this.list.splice(i,1); }
      }
    }).mount('#app');
  </script>
</body>
</html>
