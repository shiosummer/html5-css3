<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>面朝大海，春暖花开</title>
    <style>
        * {
            margin: 0;
            padding: 0;
        }
        
        body {
            background-color: lightblue;
        }
        
        .poem-box {
            background-color: lightyellow;
            text-align: center;
            padding: 20px 0;
            margin: 0;
        }
        
        .poem-box.first {
            border-bottom: 3px solid white;
        }
        
        h1 {
            font-size: 60px;
            color: purple;
            margin: 0;
        }
        
        .author-bar {
            background-color: gold;
            display: inline-block;
            padding: 5px 20px;
            margin: 10px 0;
        }
        
        .author-bar p {
            font-size: 24px;
            font-weight: bold;
            color: darkblue;
            margin: 0;
        }
        
        .poem-text {
            font-size: 28px;
            color: darkgreen;
            font-style: italic;
            font-family: "STKaiti", "KaiTi", "楷体", serif;
            line-height: 2;
        }
        
        .highlight {
            color: red;
            font-weight: bold;
        }
        
        .info-box {
            background-color: gold;
            text-align: left;
            padding: 20px;
        }
        
        .info-box p {
            margin: 8px 0;
        }
        
        .class-style {
            font-size: 22px;
            color: green;
            font-weight: bold;
        }
        
        .name-style {
            font-size: 26px;
            color: purple;
            font-weight: bold;
        }
        
        .student-style {
            font-size: 18px;
            color: black;
        }
    </style>
</head>
<body>
    <div class="poem-box first">
        <h1>面朝大海，春暖花开</h1>
        <div class="author-bar">
            <p>【作者】海子 【朝代】现代</p>
        </div>
        <div class="poem-text">
            <p>从明天起，做一个幸福的人</p>
            <p>喂马，劈柴，周游世界</p>
            <p>从明天起，关心粮食和蔬菜</p>
            <p>我有一所房子，<span class="highlight">面朝大海，春暖花开</span></p>
        </div>
    </div>
    
    <div class="poem-box">
        <h1>面朝大海，春暖花开</h1>
        <div>
            <p style="font-size: 24px; font-weight: bold; color: darkblue;">【作者】海子 【朝代】现代</p>
        </div>
        <div class="poem-text">
            <p>从明天起，做一个幸福的人</p>
            <p>喂马，劈柴，周游世界</p>
            <p>从明天起，关心粮食和蔬菜</p>
            <p>我有一所房子，<span class="highlight">面朝大海，春暖花开</span></p>
        </div>
    </div>
    
    <div class="info-box">
        <p class="class-style">班级：25计算机1</p>
        <p class="name-style">姓名：郑蔚楠</p>
        <p class="student-style">学号：24070110155</p>
    </div>
</body>
</html>
