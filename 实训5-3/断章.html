<!DOCTYPE html>

<body>
    <div class="poem-box first">
        <h1>断章</h1>
        <div class="author-bar">
            <p>【作者】卞之琳 【朝代】现代</p>
        </div>
        <div class="poem-text">
            <p>你站在桥上看风景</p>
            <p class="underline">看风景的人在楼上看你</p>
            <p>明月装饰了你的窗子</p>
            <p>你装饰了别人的梦</p>
        </div>
    </div>
    
    <div class="poem-box">
        <h1>断章</h1>

            <p style="font-size: 24px; font-weight: bold; color: black;">【作者】卞之琳 【朝代】现代</p>

            <p class="underline">看风景的人在楼上看你</p>
            <p>明月装饰了你的窗子</p>
            <p>你装饰了别人的梦</p>
        </div>
    </div>
