<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>春晓</title>
    <style>
        * {
            margin: 0;
            padding: 0;
        }
        
        body {
            background-color: cyan;
        }
        
        .poem-box {
            background-color: cyan;
            text-align: center;
            padding: 20px 0;
            margin: 0;
        }
        
        .poem-box.first {
            border-bottom: 3px solid white;
        }
        
        h1 {
            font-size: 60px;
            color: black;
            margin: 0;
        }
        
        .author {
            font-size: 24px;
            color: black;
            font-weight: bold;
            margin: 10px 0;
        }
        
        .poem-text {
            font-size: 28px;
            font-style: italic;
            font-family: "STKaiti", "KaiTi", "楷体", serif;
            line-height: 2;
        }
        
        .poem-text.top {
            color: blue;
        }
        
        .poem-text.bottom {
            color: red;
        }
    </style>
</head>
<body>
    <div class="poem-box first">
        <h1>春晓</h1>
        <p class="author">唐·孟浩然</p>
        <div class="poem-text top">
            <p>春眠不觉晓</p>
            <p>处处闻啼鸟</p>
            <p>夜来风雨声</p>
            <p>花落知多少</p>
        </div>
    </div>
    
    <div class="poem-box">
        <h1>春晓</h1>
        <p class="author">唐·孟浩然</p>
        <div class="poem-text bottom">
            <p>春眠不觉晓</p>
            <p>处处闻啼鸟</p>
            <p>夜来风雨声</p>
            <p>花落知多少</p>
        </div>
    </div>
</body>
</html>
