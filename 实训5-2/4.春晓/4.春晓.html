<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>春晓</title>
    <link rel="stylesheet" href="4.春晓.css" type="text/css">
</head>
<body>
    <div class="poem-box poem-1">
        <h1>春晓</h1>
        <p class="author">唐·孟浩然</p>
        <div class="poem-text">
            <p>春眠不觉晓</p>
            <p>处处闻啼鸟</p>
            <p>夜来风雨声</p>
            <p>花落知多少</p>
        </div>
    </div>
